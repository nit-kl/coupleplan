openapi: 3.0.3
info:
  title: CouplePlan API
  version: 0.1.0
  description: MVP API contract for P1-1 (auth and couple pairing)
servers:
  - url: https://api-staging.example.com
    description: Staging
  - url: https://api.example.com
    description: Production
tags:
  - name: auth
  - name: users
  - name: couples
  - name: roulette
  - name: ninja
paths:
  /auth/otp/request:
    post:
      tags: [auth]
      summary: Request OTP code by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "202":
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestAccepted"
  /auth/otp/verify:
    post:
      tags: [auth]
      summary: Verify OTP and issue session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token from HttpOnly refresh cookie
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke refresh token and clear auth cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /users/me:
    get:
      tags: [users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags: [users]
      summary: Withdraw current account and delete couple-scoped data
      description: Deletes the authenticated user. If the user belongs to a couple, all users and shared data in that couple are deleted.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account data deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeletion"
  /couples:
    post:
      tags: [couples]
      summary: Create couple in pending state
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Couple created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Couple"
  /couples/me:
    get:
      tags: [couples]
      summary: Get current user's couple relation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Couple found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Couple"
        "404":
          description: Couple not found
  /couples/invites:
    post:
      tags: [couples]
      summary: Issue invite code for current couple
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Invite code issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
  /couples/invites/{code}/accept:
    post:
      tags: [couples]
      summary: Accept invite code and activate couple
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite accepted and couple activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Couple"
  /roulette/plans:
    get:
      tags: [roulette]
      summary: List static plan catalog (Date Roulette)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plan catalog
          content:
            application/json:
              schema:
                type: object
                required: [plans]
                properties:
                  plans:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlanCard"
  /roulette/sessions/me:
    get:
      tags: [roulette]
      summary: Get the current roulette session for the active couple
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Roulette session view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouletteSessionView"
        "412":
          description: Active couple is required
  /roulette/sessions/me/votes:
    post:
      tags: [roulette]
      summary: Submit (upsert) like/pass votes for plans
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouletteVoteSubmission"
      responses:
        "200":
          description: Updated session view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouletteSessionView"
        "400":
          description: Invalid payload (bad_request / unknown_plan)
        "409":
          description: Session already decided
        "412":
          description: Active couple is required
  /roulette/sessions/me/spin:
    post:
      tags: [roulette]
      summary: Spin the roulette and persist a result (idempotent after decided)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Decided session view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouletteSessionView"
        "409":
          description: Session is not ready to spin (session_not_ready)
        "412":
          description: Active couple is required
  /roulette/sessions/me/restart:
    post:
      tags: [roulette]
      summary: Archive the current session and start a new collecting session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New session view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouletteSessionView"
        "412":
          description: Active couple is required
  /ninja/missions:
    get:
      tags: [ninja]
      summary: List ninja mission catalog (static)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Mission cards with point values
          content:
            application/json:
              schema:
                type: object
                required: [missions]
                properties:
                  missions:
                    type: array
                    items:
                      $ref: "#/components/schemas/NinjaMissionCard"
  /ninja/logs:
    post:
      tags: [ninja]
      summary: Declare completion of a mission (points taken from server catalog)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NinjaLogDeclaration"
      responses:
        "200":
          description: Created log entry
          content:
            application/json:
              schema:
                type: object
                required: [log]
                properties:
                  log:
                    $ref: "#/components/schemas/NinjaLogItem"
        "400":
          description: Invalid mission or payload
        "412":
          description: Active couple is required
  /ninja/week:
    get:
      tags: [ninja]
      summary: Current JST week view (own logs always; partner total after publish job)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Weekly ninja view for the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NinjaWeekView"
        "412":
          description: Active couple is required
  /ninja/jobs/publish-week:
    post:
      tags: [ninja]
      summary: Aggregate and publish weekly ninja totals for all active couples (job secret in production)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NinjaPublishWeekRequest"
      responses:
        "200":
          description: Publish completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NinjaPublishWeekResult"
        "401":
          description: Invalid job authorization
        "503":
          description: Job secret not configured in production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    OtpRequestAccepted:
      type: object
      required: [requestId, expiresInSec]
      properties:
        requestId:
          type: string
        expiresInSec:
          type: integer
          example: 600
        debugCode:
          type: string
          description: 開発/メール未接続/ALLOW_DEBUG 時のみ。本番＋本番配信利用時は返さない
    OtpVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 4
          maxLength: 8
    AuthSession:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        refreshExpiresInSec:
          type: integer
          description: Returned on OTP verify when refresh cookie is issued.
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required: [id, email, displayName, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
    AccountDeletion:
      type: object
      required: [deleted, deletedUserIds]
      properties:
        deleted:
          type: boolean
          enum: [true]
        deletedUserIds:
          type: array
          items:
            type: string
        deletedCoupleId:
          type: string
    Couple:
      type: object
      required: [id, status, members]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, active, unpaired]
        members:
          type: array
          items:
            $ref: "#/components/schemas/CoupleMember"
    CoupleMember:
      type: object
      required: [userId, role, joinedAt]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [owner, partner]
        joinedAt:
          type: string
          format: date-time
    Invite:
      type: object
      required: [id, code, status, expiresAt]
      properties:
        id:
          type: string
        code:
          type: string
        status:
          type: string
          enum: [issued, used, expired, revoked]
        expiresAt:
          type: string
          format: date-time
    PlanCard:
      type: object
      required: [id, emoji, title, description]
      properties:
        id:
          type: string
        emoji:
          type: string
        title:
          type: string
        description:
          type: string
    RouletteVoteValue:
      type: string
      enum: [like, pass]
    RouletteVote:
      type: object
      required: [planId, vote]
      properties:
        planId:
          type: string
        vote:
          $ref: "#/components/schemas/RouletteVoteValue"
    RouletteVoteSubmission:
      type: object
      required: [votes]
      properties:
        votes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RouletteVote"
    RouletteSessionStatus:
      type: string
      enum: [collecting, ready, decided]
    RouletteResultView:
      type: object
      required: [selectedPlanId, selectedPlan, decidedAt]
      properties:
        selectedPlanId:
          type: string
        selectedPlan:
          $ref: "#/components/schemas/PlanCard"
        decidedAt:
          type: string
          format: date-time
    RouletteSessionView:
      type: object
      required:
        - sessionId
        - status
        - totalPlans
        - partners
        - matchedPlanIds
        - matchThreshold
        - myVotes
      properties:
        sessionId:
          type: string
        status:
          $ref: "#/components/schemas/RouletteSessionStatus"
        totalPlans:
          type: integer
        partners:
          type: object
          required: [me, partner]
          properties:
            me:
              type: object
              required: [userId, voted, completed]
              properties:
                userId:
                  type: string
                voted:
                  type: integer
                completed:
                  type: boolean
            partner:
              type: object
              required: [userId, completed]
              properties:
                userId:
                  type: string
                completed:
                  type: boolean
        matchedPlanIds:
          type: array
          description: collecting 中は空配列。ready/decided でカップル両者が like したプランID。
          items:
            type: string
        matchThreshold:
          type: integer
          description: ready に遷移する候補数の最低値（MVPは3）。
          example: 3
        myVotes:
          type: array
          items:
            $ref: "#/components/schemas/RouletteVote"
        result:
          $ref: "#/components/schemas/RouletteResultView"
    NinjaMissionCard:
      type: object
      required: [id, emoji, title, description, point]
      properties:
        id:
          type: string
        emoji:
          type: string
        title:
          type: string
        description:
          type: string
        point:
          type: integer
    NinjaLogDeclaration:
      type: object
      required: [missionId]
      properties:
        missionId:
          type: string
    NinjaLogItem:
      type: object
      required: [id, missionId, title, point, createdAt]
      properties:
        id:
          type: string
        missionId:
          type: string
        title:
          type: string
        point:
          type: integer
        createdAt:
          type: string
          format: date-time
    NinjaWeekView:
      type: object
      required:
        - weekStart
        - weekEnd
        - myUserId
        - myPoints
        - partnerPoints
        - publishedAt
        - myLogs
      properties:
        weekStart:
          type: string
          description: Monday YYYY-MM-DD (Asia/Tokyo)
        weekEnd:
          type: string
          description: Sunday YYYY-MM-DD (Asia/Tokyo)
        myUserId:
          type: string
        myPoints:
          type: integer
        partnerPoints:
          type: integer
          nullable: true
          description: null until weekly job publishes
        publishedAt:
          type: string
          format: date-time
          nullable: true
        myLogs:
          type: array
          items:
            $ref: "#/components/schemas/NinjaLogItem"
    NinjaPublishWeekRequest:
      type: object
      properties:
        weekStart:
          type: string
          description: Optional Monday YYYY-MM-DD (JST). Defaults to current week.
    NinjaPublishWeekResult:
      type: object
      required: [weekStart, couplesPublished]
      properties:
        weekStart:
          type: string
        couplesPublished:
          type: integer
