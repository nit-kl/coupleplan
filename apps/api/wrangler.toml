# Workers + D1。デプロイは Cloudflare ダッシュボードの「Git 連携」推奨（.github の deploy ワークフローは使わない運用可）。
# 初回: Cloudflare ログイン後、以下で D1 を作成し、出力 UUID を下記 database_id に貼る。
#   cd apps/api && npx wrangler d1 create coupleplan-local
#   npx wrangler d1 create coupleplan-staging
#   npx wrangler d1 create coupleplan
# リモートへマイグレーション（認証要）: npm run d1:migrate:staging など（ルート package.json）
#
# シークレットはダッシュボード「Variables and Secrets」または wrangler secret put:
#   RESEND_API_KEY, RESEND_FROM（任意）, 公開変数 ALLOWED_ORIGINS（カンマ区切り: Pages URL + 必要なら http://localhost:5173）

name = "coupleplan-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true

[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

# ローカル: wrangler d1 create coupleplan-local の UUID
[[d1_databases]]
binding = "DB"
database_name = "coupleplan-local"
database_id = "914eb18d-26f7-4dc7-af86-7932093f17f5"
migrations_dir = "migrations"

[env.staging]
name = "coupleplan-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://stg-app.coupleplan.com,http://localhost:5173,http://127.0.0.1:5173"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "coupleplan-staging"
database_id = "2ca92f29-6c8e-4595-a4e3-07854290365e"
migrations_dir = "migrations"

[env.production]
name = "coupleplan-api"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://app.coupleplan.com,https://stg-app.coupleplan.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "coupleplan"
database_id = "fff27d9d-727d-4d51-8d61-07a86dded9c1"
migrations_dir = "migrations"
