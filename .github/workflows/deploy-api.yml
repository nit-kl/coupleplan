# P0-9: `develop` マージ → Staging API、`main` マージ → Production API。
# 要シークレット: CLOUDFLARE_API_TOKEN（必須）。`wrangler.toml` の D1 `database_id` を
# 実リソースの ID に置き換えたうえで、リポジトリの Actions secrets を設定する。
# 初回はローカルまたは CI の前に `npx wrangler d1 create ...` で DB を作り、
# マイグレーション: `npx wrangler d1 migrations apply <DB名> --remote --env <env>` を実行。

name: Deploy API (Cloudflare Workers)

on:
  push:
    branches: [develop, main]

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: D1 migrate + deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply coupleplan-staging --remote --env staging && npx wrangler deploy --env staging

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: D1 migrate + deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply coupleplan --remote --env production && npx wrangler deploy --env production
